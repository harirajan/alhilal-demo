name: Al Hilal Banking — CI/CD Pipeline

# ================================================================
# TRIGGER: runs on every push to main branch
# ================================================================
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# ================================================================
# ENVIRONMENT VARIABLES
# ================================================================
env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
  IMAGE_TAG: ${{ github.sha }}  # unique tag per commit

# ================================================================
# JOBS
# ================================================================
jobs:

  # ──────────────────────────────────────────────────────────────
  # JOB 1: BUILD AND TEST customer-service
  # ──────────────────────────────────────────────────────────────
  build-customer-service:
    name: Build & Test customer-service
    runs-on: ubuntu-latest

    steps:
      # Step 1: checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: set up Java 21
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # Step 3: compile and test
      - name: Build and test
        run: |
          cd customer-service
          mvn clean verify
        # verify = compile + test + package
        # if tests fail → pipeline stops here

      # Step 4: build Docker image
      - name: Build Docker image
        run: |
          docker build -t $DOCKER_USERNAME/customer-service:$IMAGE_TAG \
                       -t $DOCKER_USERNAME/customer-service:latest \
                       ./customer-service

      # Step 5: push to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker image
        run: |
          docker push $DOCKER_USERNAME/customer-service:$IMAGE_TAG
          docker push $DOCKER_USERNAME/customer-service:latest

  # ──────────────────────────────────────────────────────────────
  # JOB 2: BUILD AND TEST account-service
  # ──────────────────────────────────────────────────────────────
  build-account-service:
    name: Build & Test account-service
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and test
        run: |
          cd account-service
          mvn clean verify

      - name: Build Docker image
        run: |
          docker build -t $DOCKER_USERNAME/account-service:$IMAGE_TAG \
                       -t $DOCKER_USERNAME/account-service:latest \
                       ./account-service

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker image
        run: |
          docker push $DOCKER_USERNAME/account-service:$IMAGE_TAG
          docker push $DOCKER_USERNAME/account-service:latest

  # ──────────────────────────────────────────────────────────────
  # JOB 3: BUILD AND TEST bff-retail-service
  # ──────────────────────────────────────────────────────────────
  build-bff-service:
    name: Build & Test bff-retail-service
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and test
        run: |
          cd bff-retail-service
          mvn clean verify

      - name: Build Docker image
        run: |
          docker build -t $DOCKER_USERNAME/bff-retail-service:$IMAGE_TAG \
                       -t $DOCKER_USERNAME/bff-retail-service:latest \
                       ./bff-retail-service

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker image
        run: |
          docker push $DOCKER_USERNAME/bff-retail-service:$IMAGE_TAG
          docker push $DOCKER_USERNAME/bff-retail-service:latest

  # ──────────────────────────────────────────────────────────────
  # JOB 4: BUILD AND TEST api-gateway
  # ──────────────────────────────────────────────────────────────
  build-api-gateway:
    name: Build & Test api-gateway
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and test
        run: |
          cd api-gateway
          mvn clean verify

      - name: Build Docker image
        run: |
          docker build -t $DOCKER_USERNAME/api-gateway:$IMAGE_TAG \
                       -t $DOCKER_USERNAME/api-gateway:latest \
                       ./api-gateway

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker image
        run: |
          docker push $DOCKER_USERNAME/api-gateway:$IMAGE_TAG
          docker push $DOCKER_USERNAME/api-gateway:latest

  # ──────────────────────────────────────────────────────────────
  # JOB 5: DEPLOY TO K8s
  # runs only after ALL 4 build jobs succeed
  # ──────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs:
      - build-customer-service   # wait for all 4 builds
      - build-account-service
      - build-bff-service
      - build-api-gateway

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Set up kubectl
      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      # Configure K8s access
      # In production: use Azure credentials to access AKS
      - name: Configure kubectl
        run: |
          echo "${{ secrets.KUBE_CONFIG }}" > kubeconfig.yml
          export KUBECONFIG=kubeconfig.yml

      # Update K8s deployments with new image tags
      - name: Deploy customer-service
        run: |
          kubectl set image deployment/customer-service \
            customer-service=$DOCKER_USERNAME/customer-service:$IMAGE_TAG

      - name: Deploy account-service
        run: |
          kubectl set image deployment/account-service \
            account-service=$DOCKER_USERNAME/account-service:$IMAGE_TAG

      - name: Deploy bff-retail-service
        run: |
          kubectl set image deployment/bff-retail-service \
            bff-retail-service=$DOCKER_USERNAME/bff-retail-service:$IMAGE_TAG

      - name: Deploy api-gateway
        run: |
          kubectl set image deployment/api-gateway \
            api-gateway=$DOCKER_USERNAME/api-gateway:$IMAGE_TAG

      # Wait for rollout to complete
      - name: Verify deployment
        run: |
          kubectl rollout status deployment/customer-service
          kubectl rollout status deployment/account-service
          kubectl rollout status deployment/bff-retail-service
          kubectl rollout status deployment/api-gateway
          echo "All services deployed successfully!"
