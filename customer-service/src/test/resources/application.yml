spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  kafka:
    bootstrap-servers: ${spring.embedded.kafka.brokers}
  security:
    user:
      name: test
      password: test

jwt:
  secret: test-secret-key-for-unit-tests-must-be-long-enough-256-bits!!

logging:
  level:
    com.alhilal: DEBUG
    org.springframework.security: WARN
