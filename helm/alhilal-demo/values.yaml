# ─────────────────────────────────────────
# Global settings
# ─────────────────────────────────────────
pullPolicy: Never

# ─────────────────────────────────────────
# api-gateway
# ─────────────────────────────────────────
apiGateway:
  name: api-gateway
  replicaCount: 1
  image:
    repository: alhilal/api-gateway
    tag: "1.0"
  service:
    type: NodePort
    port: 8080
    targetPort: 8080
    nodePort: 30080
  probes:
    initialDelaySeconds: 120
    periodSeconds: 15
    failureThreshold: 10
    timeoutSeconds: 10

# ─────────────────────────────────────────
# bff-retail-service
# ─────────────────────────────────────────
bffRetail:
  name: bff-retail-service
  replicaCount: 1
  image:
    repository: alhilal/bff-retail-service
    tag: "1.0"
  service:
    type: ClusterIP
    port: 8085
    targetPort: 8085

# ─────────────────────────────────────────
# customer-service
# ─────────────────────────────────────────
customerService:
  name: customer-service
  replicaCount: 1
  image:
    repository: alhilal/customer-service
    tag: "1.0"
  service:
    type: ClusterIP
    port: 8082
    targetPort: 8082

# ─────────────────────────────────────────
# account-service
# ─────────────────────────────────────────
accountService:
  name: account-service
  replicaCount: 1
  image:
    repository: alhilal/account-service
    tag: "1.0"
  service:
    type: ClusterIP
    port: 8083
    targetPort: 8083

# ─────────────────────────────────────────
# Redis
# ─────────────────────────────────────────
redis:
  name: redis
  replicaCount: 1
  image:
    repository: redis
    tag: "7.2"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 6379
    targetPort: 6379

# ─────────────────────────────────────────
# Kafka
# ─────────────────────────────────────────
kafka:
  name: kafka
  replicaCount: 1
  image:
    repository: apache/kafka
    tag: "3.7.0"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 9092
    targetPort: 9092

# ─────────────────────────────────────────
# Default health probe settings
# ─────────────────────────────────────────
probes:
  initialDelaySeconds: 60
  periodSeconds: 10
  failureThreshold: 5
  timeoutSeconds: 5

# ─────────────────────────────────────────
# ConfigMap and Secret names
# ─────────────────────────────────────────
configMapName: alhilal-config
secretName: alhilal-secrets

# ─────────────────────────────────────────
# Resource defaults
# ─────────────────────────────────────────
resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "300m"

# ─────────────────────────────────────────
# HPA settings
# ─────────────────────────────────────────
hpa:
  bff:
    minReplicas: 1
    maxReplicas: 5
    targetCPU: 50
  customerService:
    minReplicas: 1
    maxReplicas: 3
    targetCPU: 60
