server:
  port: 8099

spring:
  application:
    name: event-store-service
  datasource:
    url: jdbc:h2:mem:eventstore
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  h2:
    console:
      enabled: true
      path: /h2-console

logging:
  level:
    com.alhilal: DEBUG
