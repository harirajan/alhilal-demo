version: '3.8'

services:

  # ================================================================
  # INFRASTRUCTURE
  # ================================================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: alhilal-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: alhilal-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: true

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: alhilal-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: alhilal-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

  redis:
    image: redis:7.2
    container_name: alhilal-redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru

  # ================================================================
  # APPLICATION SERVICES
  # ================================================================
  customer-service:
    image: alhilal/customer-service:1.0
    container_name: alhilal-customer-service
    ports:
      - "8082:8082"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATASOURCE_URL: jdbc:h2:file:./data/customersdb;DB_CLOSE_DELAY=-1
    depends_on:
      - kafka

  account-service:
    image: alhilal/account-service:1.0
    container_name: alhilal-account-service
    ports:
      - "8083:8083"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATASOURCE_URL: jdbc:h2:file:./data/accountsdb;DB_CLOSE_DELAY=-1
    depends_on:
      - kafka
      - customer-service

  bff-retail-service:
    image: alhilal/bff-retail-service:1.0
    container_name: alhilal-bff-retail-service
    ports:
      - "8085:8085"
    environment:
      SERVICES_CUSTOMER_URL: http://customer-service:8082
      SERVICES_ACCOUNT_URL: http://account-service:8083
      SPRING_DATA_REDIS_HOST: redis
    depends_on:
      - customer-service
      - account-service
      - redis

  api-gateway:
    image: alhilal/api-gateway:1.0
    container_name: alhilal-api-gateway
    ports:
      - "8080:8080"
    environment:
      SPRING_DATA_REDIS_HOST: redis
      CUSTOMER_SERVICE_URL: http://customer-service:8082
      ACCOUNT_SERVICE_URL: http://account-service:8083
      BFF_SERVICE_URL: http://bff-retail-service:8085
    depends_on:
      - bff-retail-service
      - redis

  Prometheus:
    image: prom/prometheus:latest
    container_name: alhilal-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - customer-service
      - account-service
      - bff-retail-service
      - api-gateway

  Grafana:
    image: grafana/grafana:latest
    container_name: alhilal-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    depends_on:
      - Prometheus